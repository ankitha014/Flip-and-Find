<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Fredoka',sans-serif}

.perspective{perspective:800px}
.card-inner{transition:transform .5s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;position:relative;width:100%;height:100%}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;justify-content:center}
.card-back{transform:rotateY(180deg)}

@keyframes shake{0%,100%{transform:rotateY(0) translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake .card-inner{animation:shake .5s ease}

@keyframes matchGlow{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}50%{box-shadow:0 0 20px 8px rgba(34,197,94,.4)}100%{box-shadow:0 0 8px 2px rgba(34,197,94,.2)}}
.matched .card-inner{animation:matchGlow .6s ease forwards}
.matched .card-back{border:3px solid #22c55e}

@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100%) rotate(720deg);opacity:0}}
.confetti-piece{position:absolute;width:10px;height:10px;animation:confetti-fall linear forwards}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pulse{animation:pulse .8s ease infinite}

@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .5s ease forwards}

@keyframes comboPopIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.combo-pop{animation:comboPopIn .4s ease forwards}

.glass{background:rgba(255,255,255,.12);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.2)}
.glass-dark{background:rgba(0,0,0,.25);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1)}

.progress-bar{transition:width .4s ease}

/* Theme backgrounds */
.theme-jungle{background:linear-gradient(135deg,#0b3d0b 0%,#1a5c1a 30%,#2d7a2d 60%,#0f4f0f 100%)}
.theme-space{background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 30%,#2d1b69 60%,#0d0d3b 100%)}
.theme-ocean{background:linear-gradient(135deg,#0a2a3f 0%,#0d4a6b 30%,#1a6b8a 60%,#0a3352 100%)}

.btn-glow{transition:all .2s ease}
.btn-glow:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn-glow:active{transform:translateY(0)}

.power-btn{transition:all .2s ease}
.power-btn:hover:not(:disabled){transform:scale(1.1)}
.power-btn:disabled{opacity:.4;cursor:not-allowed}

.star{display:inline-block;transition:all .3s ease}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full overflow-auto relative"></div>
  <script>
const defaultConfig = {
  game_title: 'Memory Match',
  easy_label: 'Easy',
  medium_label: 'Medium',
  hard_label: 'Hard',
  play_again_text: 'Play Again',
  bg_color: '#1a1a2e',
  surface_color: '#ffffff',
  text_color: '#f8fafc',
  primary_action_color: '#8b5cf6',
  secondary_action_color: '#f59e0b'
};

let config = { ...defaultConfig };

// Game State
let gameState = {
  screen: 'menu', // menu | levelSelect | game | results
  theme: 'jungle',
  level: 'easy',
  cards: [],
  flippedCards: [],
  matchedPairs: 0,
  totalPairs: 0,
  score: 0,
  combo: 0,
  maxCombo: 0,
  timer: 60,
  timerInterval: null,
  moves: 0,
  locked: false,
  hints: 2,
  shuffles: 1,
  freezes: 1,
  frozen: false
};

const themes = {
  jungle: {
    name: 'Jungle',
    icon: '🌴',
    class: 'theme-jungle',
    cardBg: 'linear-gradient(135deg,#2d7a2d,#1a5c1a)',
    emojis: ['🦁','🐒','🦜','🐍','🦎','🐸','🦋','🌺']
  },
  space: {
    name: 'Space',
    icon: '🚀',
    class: 'theme-space',
    cardBg: 'linear-gradient(135deg,#4c1d95,#1e1b4b)',
    emojis: ['🚀','🌍','🌙','⭐','🛸','👽','☄️','🔭']
  },
  ocean: {
    name: 'Ocean',
    icon: '🌊',
    class: 'theme-ocean',
    cardBg: 'linear-gradient(135deg,#0369a1,#0c4a6e)',
    emojis: ['🐙','🦈','🐠','🐬','🦀','🐢','🪸','🐋']
  }
};

const levels = {
  easy: { pairs: 4, cols: 4, time: 60 },
  medium: { pairs: 6, cols: 4, time: 90 },
  hard: { pairs: 8, cols: 4, time: 120 }
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  const app = document.getElementById('app');
  const s = gameState;

  if (s.screen === 'menu') renderMenu(app);
  else if (s.screen === 'levelSelect') renderLevelSelect(app);
  else if (s.screen === 'game') renderGame(app);
  else if (s.screen === 'results') renderResults(app);

  if (window.lucide) lucide.createIcons();
}

function renderMenu(app) {
  const t = themes;
  app.className = 'w-full h-full overflow-auto relative theme-space';
  app.innerHTML = `
    <div class="w-full min-h-full flex flex-col items-center justify-center p-6" style="background:radial-gradient(ellipse at 50% 30%,rgba(139,92,246,.2),transparent 60%)">
      <!-- Floating particles -->
      <div class="absolute inset-0 overflow-hidden pointer-events-none">
        ${Array.from({length:20},(_,i)=>`<div class="absolute rounded-full" style="width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;background:rgba(255,255,255,${.1+Math.random()*.15});left:${Math.random()*100}%;top:${Math.random()*100}%;animation:pulse ${2+Math.random()*3}s ease infinite ${Math.random()*2}s"></div>`).join('')}
      </div>

      <div class="relative z-10 text-center slide-up">
        <div class="text-6xl mb-4">🧠</div>
        <h1 id="titleEl" class="text-5xl font-bold mb-3" style="color:${config.text_color};text-shadow:0 0 30px rgba(139,92,246,.5)">${config.game_title}</h1>
        <p class="text-lg mb-10 opacity-70" style="color:${config.text_color}">Choose your adventure</p>

        <div class="flex flex-wrap justify-center gap-5 mb-10">
          ${Object.entries(t).map(([key, th]) => `
            <button onclick="selectTheme('${key}')" class="glass btn-glow rounded-2xl p-6 w-40 text-center cursor-pointer group">
              <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">${th.icon}</div>
              <div class="font-semibold text-lg" style="color:${config.text_color}">${th.name}</div>
            </button>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function selectTheme(theme) {
  gameState.theme = theme;
  gameState.screen = 'levelSelect';
  render();
}

function renderLevelSelect(app) {
  const th = themes[gameState.theme];
  app.className = `w-full h-full overflow-auto relative ${th.class}`;
  const lvlData = [
    { key:'easy', label: config.easy_label, pairs:4, icon:'😊', stars:1, desc:'4 pairs • 60s', color:'#22c55e' },
    { key:'medium', label: config.medium_label, pairs:6, icon:'🤔', stars:2, desc:'6 pairs • 90s', color:'#f59e0b' },
    { key:'hard', label: config.hard_label, pairs:8, icon:'🔥', stars:3, desc:'8 pairs • 120s', color:'#ef4444' }
  ];

  app.innerHTML = `
    <div class="w-full min-h-full flex flex-col items-center p-6">
      <button onclick="gameState.screen='menu';render()" class="self-start glass rounded-full px-4 py-2 flex items-center gap-2 mb-6 btn-glow" style="color:${config.text_color}">
        <i data-lucide="arrow-left" style="width:18px;height:18px"></i> Back
      </button>

      <div class="text-4xl mb-2">${th.icon}</div>
      <h2 class="text-3xl font-bold mb-2" style="color:${config.text_color}">${th.name} Theme</h2>
      <p class="opacity-60 mb-8" style="color:${config.text_color}">Select difficulty</p>

      <div class="flex flex-col gap-5 w-full max-w-sm">
        ${lvlData.map((l,i) => `
          <button onclick="startGame('${l.key}')" class="glass btn-glow rounded-2xl p-5 text-left slide-up" style="animation-delay:${i*.1}s">
            <div class="flex items-center gap-4">
              <div class="text-4xl">${l.icon}</div>
              <div class="flex-1">
                <div class="font-bold text-xl" style="color:${config.text_color}">${l.label}</div>
                <div class="text-sm opacity-60" style="color:${config.text_color}">${l.desc}</div>
              </div>
              <div class="flex gap-1">
                ${Array.from({length:3},(_,si)=>`<span class="star text-lg">${si<l.stars?'⭐':'☆'}</span>`).join('')}
              </div>
            </div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function startGame(level) {
  const th = themes[gameState.theme];
  const lv = levels[level];
  const emojis = shuffle(th.emojis).slice(0, lv.pairs);
  const cards = shuffle([...emojis, ...emojis]).map((e, i) => ({
    id: i, emoji: e, flipped: false, matched: false
  }));

  Object.assign(gameState, {
    screen: 'game', level, cards, flippedCards: [],
    matchedPairs: 0, totalPairs: lv.pairs, score: 0,
    combo: 0, maxCombo: 0, timer: lv.time, moves: 0,
    locked: false, hints: 2, shuffles: 1, freezes: 1, frozen: false
  });

  if (gameState.timerInterval) clearInterval(gameState.timerInterval);
  gameState.timerInterval = setInterval(() => {
    if (gameState.frozen) return;
    gameState.timer--;
    updateTimerUI();
    if (gameState.timer <= 0) endGame(false);
  }, 1000);

  render();
}

function updateTimerUI() {
  const el = document.getElementById('timer');
  if (el) {
    const m = Math.floor(gameState.timer / 60);
    const s = gameState.timer % 60;
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (gameState.timer <= 10) el.classList.add('text-red-400','pulse');
  }
  const pb = document.getElementById('progressBar');
  if (pb) {
    const lv = levels[gameState.level];
    pb.style.width = `${(gameState.timer / lv.time) * 100}%`;
  }
}

function renderGame(app) {
  const th = themes[gameState.theme];
  const s = gameState;
  const lv = levels[s.level];
  const m = Math.floor(s.timer / 60);
  const sec = s.timer % 60;
  const cols = lv.cols;

  app.className = `w-full h-full overflow-auto relative ${th.class}`;
  app.innerHTML = `
    <div class="w-full min-h-full flex flex-col p-4 max-w-lg mx-auto">
      <!-- Top Bar -->
      <div class="flex items-center justify-between mb-3">
        <button onclick="quitGame()" class="glass rounded-full p-2 btn-glow" style="color:${config.text_color}">
          <i data-lucide="x" style="width:20px;height:20px"></i>
        </button>
        <div class="glass rounded-full px-4 py-1 font-bold" style="color:${config.text_color}">
          <i data-lucide="star" style="width:16px;height:16px;display:inline;vertical-align:middle;color:${config.secondary_action_color}"></i>
          <span id="scoreEl">${s.score}</span>
        </div>
        <div id="timer" class="glass rounded-full px-4 py-1 font-bold ${s.timer<=10?'text-red-400 pulse':''}" style="color:${s.timer<=10?'#f87171':config.text_color}">
          ${m}:${sec.toString().padStart(2,'0')}
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="w-full h-2 rounded-full mb-3" style="background:rgba(255,255,255,.15)">
        <div id="progressBar" class="h-full rounded-full progress-bar" style="width:${(s.timer/lv.time)*100}%;background:linear-gradient(90deg,${config.primary_action_color},${config.secondary_action_color})"></div>
      </div>

      <!-- Combo -->
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-sm opacity-70" style="color:${config.text_color}">Pairs: ${s.matchedPairs}/${s.totalPairs}</span>
        </div>
        <div id="comboEl" class="${s.combo>=2?'combo-pop':''}" style="color:${config.secondary_action_color}">
          ${s.combo >= 2 ? `<span class="font-bold text-sm">🔥 ${s.combo}x Combo!</span>` : ''}
        </div>
      </div>

      <!-- Cards Grid -->
      <div id="cardGrid" class="grid gap-3 flex-1 content-center" style="grid-template-columns:repeat(${cols},1fr)">
        ${s.cards.map(c => `
          <div id="card-${c.id}" class="perspective cursor-pointer ${c.matched?'matched':''} ${c.shaking?'shake':''}"
               onclick="flipCard(${c.id})" style="aspect-ratio:1">
            <div class="card-inner ${c.flipped||c.matched?'flipped':''}">
              <div class="card-face" style="background:${th.cardBg};box-shadow:0 4px 15px rgba(0,0,0,.3)">
                <span class="text-3xl">❓</span>
              </div>
              <div class="card-face card-back" style="background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,.2);${c.matched?'border-color:#22c55e;box-shadow:0 0 15px rgba(34,197,94,.3)':''}">
                <span class="text-3xl md:text-4xl">${c.emoji}</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Power-ups -->
      <div class="flex justify-center gap-4 mt-4 mb-2">
        <button onclick="useHint()" class="power-btn glass rounded-xl px-4 py-2 flex items-center gap-2" style="color:${config.text_color}" ${s.hints<=0?'disabled':''}>
          <i data-lucide="eye" style="width:18px;height:18px"></i>
          <span class="text-sm font-semibold">Hint (${s.hints})</span>
        </button>
        <button onclick="useShuffle()" class="power-btn glass rounded-xl px-4 py-2 flex items-center gap-2" style="color:${config.text_color}" ${s.shuffles<=0?'disabled':''}>
          <i data-lucide="shuffle" style="width:18px;height:18px"></i>
          <span class="text-sm font-semibold">Shuffle (${s.shuffles})</span>
        </button>
        <button onclick="useFreeze()" class="power-btn glass rounded-xl px-4 py-2 flex items-center gap-2" style="color:${config.text_color}" ${s.freezes<=0?'disabled':''}>
          <i data-lucide="snowflake" style="width:18px;height:18px"></i>
          <span class="text-sm font-semibold">Freeze (${s.freezes})</span>
        </button>
      </div>
    </div>
  `;
}

function flipCard(id) {
  const s = gameState;
  if (s.locked) return;
  const card = s.cards[id];
  if (card.flipped || card.matched) return;

  card.flipped = true;
  s.flippedCards.push(id);

  // Update just this card
  const el = document.getElementById(`card-${id}`);
  if (el) el.querySelector('.card-inner').classList.add('flipped');

  if (s.flippedCards.length === 2) {
    s.locked = true;
    s.moves++;
    const [a, b] = s.flippedCards;
    const cA = s.cards[a], cB = s.cards[b];

    if (cA.emoji === cB.emoji) {
      // Match!
      cA.matched = cB.matched = true;
      s.matchedPairs++;
      s.combo++;
      if (s.combo > s.maxCombo) s.maxCombo = s.combo;
      s.score += 100 * s.combo;
      s.flippedCards = [];
      s.locked = false;

      // Update UI
      [a, b].forEach(i => {
        const cel = document.getElementById(`card-${i}`);
        if (cel) {
          cel.classList.add('matched');
          cel.querySelector('.card-back').style.borderColor = '#22c55e';
          cel.querySelector('.card-back').style.boxShadow = '0 0 15px rgba(34,197,94,.3)';
        }
      });
      const scoreEl = document.getElementById('scoreEl');
      if (scoreEl) scoreEl.textContent = s.score;
      const comboEl = document.getElementById('comboEl');
      if (comboEl && s.combo >= 2) {
        comboEl.innerHTML = `<span class="font-bold text-sm combo-pop">🔥 ${s.combo}x Combo!</span>`;
      }
      const pairsEl = document.querySelector('[class*="opacity-70"]');
      if (pairsEl) pairsEl.textContent = `Pairs: ${s.matchedPairs}/${s.totalPairs}`;

      if (s.matchedPairs === s.totalPairs) setTimeout(() => endGame(true), 600);
    } else {
      // No match
      s.combo = 0;
      const comboEl = document.getElementById('comboEl');
      if (comboEl) comboEl.innerHTML = '';

      setTimeout(() => {
        [a, b].forEach(i => {
          const cel = document.getElementById(`card-${i}`);
          if (cel) {
            cel.classList.add('shake');
            setTimeout(() => {
              cel.classList.remove('shake');
              cel.querySelector('.card-inner').classList.remove('flipped');
            }, 500);
          }
          s.cards[i].flipped = false;
        });
        s.flippedCards = [];
        s.locked = false;
      }, 800);
    }
  }
}

function useHint() {
  const s = gameState;
  if (s.hints <= 0 || s.locked) return;
  s.hints--;

  // Find an unmatched pair and briefly show them
  const unmatched = s.cards.filter(c => !c.matched && !c.flipped);
  if (unmatched.length < 2) return;

  const emoji = unmatched[0].emoji;
  const pair = unmatched.filter(c => c.emoji === emoji).slice(0, 2);

  s.locked = true;
  pair.forEach(c => {
    const el = document.getElementById(`card-${c.id}`);
    if (el) el.querySelector('.card-inner').classList.add('flipped');
  });

  setTimeout(() => {
    pair.forEach(c => {
      if (!c.matched) {
        const el = document.getElementById(`card-${c.id}`);
        if (el) el.querySelector('.card-inner').classList.remove('flipped');
      }
    });
    s.locked = false;
  }, 1000);

  render(); // Update button count
}

function useShuffle() {
  const s = gameState;
  if (s.shuffles <= 0 || s.locked) return;
  s.shuffles--;

  const unmatched = s.cards.filter(c => !c.matched);
  const emojis = shuffle(unmatched.map(c => c.emoji));
  unmatched.forEach((c, i) => { c.emoji = emojis[i]; c.flipped = false; });

  render();
}

function useFreeze() {
  const s = gameState;
  if (s.freezes <= 0) return;
  s.freezes--;
  s.frozen = true;

  const timerEl = document.getElementById('timer');
  if (timerEl) timerEl.style.color = '#38bdf8';

  setTimeout(() => {
    s.frozen = false;
    if (timerEl) timerEl.style.color = '';
  }, 5000);

  render();
}

function quitGame() {
  if (gameState.timerInterval) clearInterval(gameState.timerInterval);
  gameState.screen = 'menu';
  render();
}

function endGame(won) {
  if (gameState.timerInterval) clearInterval(gameState.timerInterval);
  gameState.screen = 'results';
  gameState.won = won;
  render();
}

function renderResults(app) {
  const th = themes[gameState.theme];
  const s = gameState;
  const stars = s.won ? (s.combo >= 3 ? 3 : s.matchedPairs === s.totalPairs && s.moves <= s.totalPairs * 2 ? 3 : s.moves <= s.totalPairs * 3 ? 2 : 1) : 0;

  app.className = `w-full h-full overflow-auto relative ${th.class}`;
  app.innerHTML = `
    <div id="confettiContainer" class="absolute inset-0 overflow-hidden pointer-events-none"></div>
    <div class="w-full min-h-full flex flex-col items-center justify-center p-6 relative z-10">
      <div class="glass rounded-3xl p-8 max-w-sm w-full text-center slide-up">
        <div class="text-6xl mb-4">${s.won ? '🎉' : '⏰'}</div>
        <h2 class="text-3xl font-bold mb-2" style="color:${config.text_color}">${s.won ? 'You Won!' : 'Time\'s Up!'}</h2>

        <div class="flex justify-center gap-2 mb-4">
          ${Array.from({length:3},(_,i)=>`<span class="star text-3xl" style="animation-delay:${i*.2}s">${i<stars?'⭐':'☆'}</span>`).join('')}
        </div>

        <div class="space-y-3 mb-6">
          <div class="flex justify-between glass rounded-xl px-4 py-2">
            <span class="opacity-70" style="color:${config.text_color}">Score</span>
            <span class="font-bold" style="color:${config.secondary_action_color}">${s.score}</span>
          </div>
          <div class="flex justify-between glass rounded-xl px-4 py-2">
            <span class="opacity-70" style="color:${config.text_color}">Moves</span>
            <span class="font-bold" style="color:${config.text_color}">${s.moves}</span>
          </div>
          <div class="flex justify-between glass rounded-xl px-4 py-2">
            <span class="opacity-70" style="color:${config.text_color}">Max Combo</span>
            <span class="font-bold" style="color:${config.secondary_action_color}">🔥 ${s.maxCombo}x</span>
          </div>
          <div class="flex justify-between glass rounded-xl px-4 py-2">
            <span class="opacity-70" style="color:${config.text_color}">Pairs Found</span>
            <span class="font-bold" style="color:${config.text_color}">${s.matchedPairs}/${s.totalPairs}</span>
          </div>
        </div>

        <button onclick="startGame('${s.level}')" id="playAgainBtn" class="w-full rounded-xl py-3 font-bold text-lg text-white btn-glow mb-3" style="background:linear-gradient(135deg,${config.primary_action_color},${config.secondary_action_color})">
          ${config.play_again_text}
        </button>
        <button onclick="gameState.screen='levelSelect';render()" class="w-full glass rounded-xl py-3 font-semibold btn-glow" style="color:${config.text_color}">
          Change Level
        </button>
      </div>
    </div>
  `;

  if (s.won) spawnConfetti();
}

function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  if (!container) return;
  const colors = ['#ef4444','#f59e0b','#22c55e','#3b82f6','#a855f7','#ec4899'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + '%';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = Math.random() * 2 + 's';
    container.appendChild(el);
  }
}

// Element SDK
if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (cfg) => {
      config = { ...defaultConfig, ...cfg };
      // Update visible text elements
      const titleEl = document.getElementById('titleEl');
      if (titleEl) titleEl.textContent = config.game_title;
      const playBtn = document.getElementById('playAgainBtn');
      if (playBtn) playBtn.textContent = config.play_again_text;
      // For color/font changes, re-render
      render();
    },
    mapToCapabilities: (cfg) => ({
      recolorables: [
        { get: () => cfg.bg_color || defaultConfig.bg_color, set: v => { cfg.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
        { get: () => cfg.surface_color || defaultConfig.surface_color, set: v => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => cfg.text_color || defaultConfig.text_color, set: v => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => cfg.primary_action_color || defaultConfig.primary_action_color, set: v => { cfg.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
        { get: () => cfg.secondary_action_color || defaultConfig.secondary_action_color, set: v => { cfg.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
      ],
      borderables: [],
      fontEditable: {
        get: () => cfg.font_family || 'Fredoka',
        set: v => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => cfg.font_size || 16,
        set: v => { cfg.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (cfg) => new Map([
      ['game_title', cfg.game_title || defaultConfig.game_title],
      ['easy_label', cfg.easy_label || defaultConfig.easy_label],
      ['medium_label', cfg.medium_label || defaultConfig.medium_label],
      ['hard_label', cfg.hard_label || defaultConfig.hard_label],
      ['play_again_text', cfg.play_again_text || defaultConfig.play_again_text]
    ])
  });
} else {
  console.warn("Element SDK not found. Running in standalone mode.");
}

render();
